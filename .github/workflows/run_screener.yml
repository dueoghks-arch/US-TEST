name: Stock Screener Bot

on:
  schedule:
    # 매주 토요일 00:00 UTC (한국 시간 토요일 오전 9시)
    - cron: '28 05 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
    # v3에서 최신 v4로 변경하여 Node.js 경고 해결
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    # v4에서 올바른 python-version 옵션 사용
    - name: 파이썬 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 라이브러리 설치
      run: |
        pip install -r requirements.txt

    - name: 스크립트 실행
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      run: python main.py
